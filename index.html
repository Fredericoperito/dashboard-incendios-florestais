<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard · Incêndios Florestais · CBMERJ</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #e0e0e0; padding: 20px; min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; }
        
        header { margin-bottom: 30px; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 12px; border: 1px solid rgba(230, 92, 0, 0.4); }
        .header-inner { display: flex; align-items: center; justify-content: space-between; gap: 20px; }
        .header-text { text-align: center; flex: 1; }
        .logo-cbmerj, .logo-dppt { height: 80px; width: auto; object-fit: contain; flex-shrink: 0; }
        
        h1 { color: #E65C00; font-size: 2.2em; margin-bottom: 8px; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .subtitle { color: #FFD700; font-size: 1.1em; margin-bottom: 4px; }
        .description { color: #b0b0b0; font-size: 0.9em; }

        .planilha-diaria { background: rgba(255,255,255,0.08); border-radius: 12px; padding: 25px; margin-bottom: 30px; border: 2px solid #E65C00; }
        .form-row { display: flex; gap: 15px; margin-bottom: 20px; align-items: center; }
        .form-row label { color: #FFD700; font-weight: 600; min-width: 180px; }
        .form-row input[type="date"], .search-wrapper input { padding: 10px; border-radius: 6px; border: 1px solid #E65C00; background: rgba(255,255,255,0.1); color: #fff; }
        
        .tabela-preenchimento { width: 100%; max-width: 800px; border-collapse: collapse; margin-top: 20px; background: rgba(0,0,0,0.3); }
        .tabela-preenchimento th { background: #E65C00; color: #fff; padding: 12px; text-align: left; }
        .tabela-preenchimento td { padding: 10px; border: 1px solid rgba(230, 92, 0, 0.2); }
        .tabela-preenchimento td:first-child { color: #FFD700; font-weight: 600; width: 70%; }
        .tabela-preenchimento td:last-child { text-align: center; }
        .tabela-preenchimento input[type="number"] { width: 100%; max-width: 150px; padding: 10px; border-radius: 4px; border: 1px solid #E65C00; background: rgba(255,255,255,0.1); color: #fff; text-align: center; font-size: 1.1em; }
        
        .aviso-data { color: #ff4d4d; font-size: 0.9em; font-weight: bold; margin-left: 10px; }

        .btn-enviar { margin-top: 20px; padding: 15px; width: 100%; max-width: 800px; background: linear-gradient(135deg, #E65C00 0%, #B33600 100%); color: #fff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 1.1em; }
        .btn-enviar:hover { opacity: 0.9; }
        .status-message { padding: 12px; border-radius: 6px; margin-bottom: 20px; text-align: center; font-weight: bold; }
        .status-success { background: #2e7d32; color: #fff; }
        .status-loading { background: #1565c0; color: #fff; }
        .status-error { background: #c62828; color: #fff; }

        .controls { display: flex; gap: 10px; margin-bottom: 25px; }
        .btn-refresh { background: #2e7d32; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        
        .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .kpi-card { background: rgba(255,255,255,0.08); padding: 20px; border-radius: 12px; text-align: center; border: 1px solid rgba(230, 92, 0, 0.2); }
        .kpi-label { color: #b0b0b0; font-size: 0.9em; margin-bottom: 5px; }
        .kpi-value { font-size: 2.2em; font-weight: bold; color: #FFD700; }
        
        /* Grade de Gráficos */
        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 25px; margin-bottom: 30px; }
        .chart-container, .table-container { background: rgba(255,255,255,0.08); padding: 20px; border-radius: 12px; border: 1px solid rgba(230, 92, 0, 0.2); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        canvas { max-width: 100%; }

        .search-wrapper { position: relative; display: inline-flex; align-items: center; margin-bottom: 15px; width: 100%; max-width: 400px; }
        .search-wrapper input { padding-left: 35px; width: 100%; }
        .search-icon { position: absolute; left: 10px; opacity: 0.7; }

        #dataTable { width: 100%; border-collapse: collapse; margin-top: 10px; }
        #dataTable th { background: rgba(230, 92, 0, 0.2); color: #FFD700; padding: 10px; text-align: left; }
        #dataTable td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        @media (max-width: 768px) { .header-inner { flex-direction: column; } }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="header-inner">
            <img src="logo_cbmerj.png" alt="Logo CBMERJ" class="logo-cbmerj" onerror="this.src='https://via.placeholder.com/80x80?text=CBMERJ'">
            <div class="header-text">
                <h1>Dashboard · Incêndios Florestais</h1>
                <div class="subtitle">Regulação de Eventos — D-1</div>
            </div>
            <img src="logo_dppt.png" alt="Logo DPPT" class="logo-dppt" onerror="this.src='https://via.placeholder.com/120x80?text=DPPT'">
        </div>
    </header>

    <div id="statusContainer"></div>

    <section class="planilha-diaria">
        <h2>📋 Regulação Consolidada do Dia Anterior (D-1)</h2>
        <div class="form-row">
            <label for="dataMonitoramento">Data da Regulação:</label>
            <input type="date" id="dataMonitoramento">
        </div>
        
        <table class="tabela-preenchimento">
            <thead><tr><th>Categoria</th><th style="text-align: center;">Quantidade Total</th></tr></thead>
            <tbody>
                <tr><td>Fora do Parâmetro</td><td><input type="number" min="0" value="0" data-categoria="Fora do Parâmetro"></td></tr>
                <tr><td>Preenchimento remoto de formulário</td><td><input type="number" min="0" value="0" data-categoria="Preenchimento remoto de formulário"></td></tr>
                <tr><td>Agendar</td><td><input type="number" min="0" value="0" data-categoria="Agendar"></td></tr>
                <tr><td>Formulário sem exame de local</td><td><input type="number" min="0" value="0" data-categoria="Formulário sem exame de local"></td></tr>
            </tbody>
        </table>
        <button class="btn-enviar" onclick="enviarDadosFlorestais()">✅ Enviar Regulação</button>
    </section>

    <div class="controls">
        <button class="btn-refresh" onclick="carregarDadosDaPlanilha()">🔄 Atualizar Gráficos</button>
    </div>

    <div class="kpis">
        <div class="kpi-card"><div class="kpi-label">Total Ocorrências</div><div class="kpi-value" id="kpiTotal">0</div></div>
        <div class="kpi-card"><div class="kpi-label">Dias Regulados</div><div class="kpi-value" id="kpiDias">0</div></div>
    </div>

    <div class="charts-grid">
        <div class="chart-container"><canvas id="chartDia"></canvas></div>
        <div class="chart-container"><canvas id="chartCategoria"></canvas></div>
        <div class="chart-container"><canvas id="chartDist"></canvas></div>
    </div>

    <div class="table-container">
        <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchDetalhado" placeholder="Buscar categoria, data..." oninput="aplicarFiltros()">
        </div>
        <table id="dataTable">
            <thead><tr><th>Data Regulação</th><th>Categoria</th><th>Valor Total</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    // ⚠️ COLOQUE A SUA URL NOVA AQUI (Terminando em /exec)
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwvHFG7wG2Ieqn_0S0yjZTWc9tFXWPgBYq1GwKvBEVYG8cyEC8wjXpKSn5VuOU14uUbzA/exec";

    let dadosOriginais = [];
    let meuChartDia = null;
    let meuChartCat = null;
    let meuChartDist = null;

    function configurarDataDiaAnterior() {
        const hoje = new Date();
        const ontem = new Date(hoje);
        ontem.setDate(hoje.getDate() - 1);
        const ano = ontem.getFullYear();
        const mes = String(ontem.getMonth() + 1).padStart(2, '0');
        const dia = String(ontem.getDate()).padStart(2, '0');
        document.getElementById('dataMonitoramento').value = `${ano}-${mes}-${dia}`;
    }

    function mostrarStatus(mensagem, tipo) {
        const container = document.getElementById('statusContainer');
        container.innerHTML = `<div class="status-message status-${tipo}">${mensagem}</div>`;
    }

    function zerarCamposFormulario() {
        document.querySelectorAll('.tabela-preenchimento input[type="number"]').forEach(input => input.value = 0);
    }

    async function enviarDadosFlorestais() {
        const dataReg = document.getElementById('dataMonitoramento').value;
        if (!dataReg) return alert("Selecione a data!");

        mostrarStatus("Enviando regulação...", "loading");

        const payload = {
            "Data da regulacao": dataReg,
            "Dia": new Date(dataReg + 'T00:00:00').getDate()
        };

        document.querySelectorAll('.tabela-preenchimento input[type="number"]').forEach(input => {
            payload[input.getAttribute('data-categoria')] = parseInt(input.value) || 0;
        });

        try {
            await fetch(APPS_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            mostrarStatus("✅ Regulação enviada!", "success");
            zerarCamposFormulario(); 
            setTimeout(() => document.getElementById('statusContainer').innerHTML = '', 4000);
            
            // Aguarda 1 segundo e recarrega a planilha
            setTimeout(carregarDadosDaPlanilha, 1000);
        } catch (e) {
            mostrarStatus("❌ Erro ao enviar.", "error");
        }
    }

    async function carregarDadosDaPlanilha() {
        try {
            // MÁGICA CONTRA O CACHE: O "?t=" adiciona os milissegundos atuais na URL
            const urlSemCache = APPS_SCRIPT_URL + "?t=" + new Date().getTime();
            
            const res = await fetch(urlSemCache);
            const dados = await res.json();
            
            // Verificação de erro vinda do Google Sheets
            if (dados.erro) {
                throw new Error(dados.erro);
            }
            
            dadosOriginais = dados.map(row => ({
                Data: row['Data da regulacao'] || row['data'] || row['Data'],
                Categoria: row['categoria'] || row['Categoria'],
                Valor: parseInt(row['valor'] || row['Valor'] || 0)
            })).filter(d => d.Valor > 0);

            aplicarFiltros();
        } catch (e) {
            console.error("Erro na leitura:", e);
            mostrarStatus("⚠️ Erro ao carregar gráficos: " + e.message, "error");
            setTimeout(() => document.getElementById('statusContainer').innerHTML = '', 6000);
        }
    }

    function aplicarFiltros() {
        const busca = document.getElementById('searchDetalhado').value.toLowerCase();
        const filtrados = dadosOriginais.filter(d => (d.Categoria && d.Categoria.toLowerCase().includes(busca)) || (d.Data && d.Data.includes(busca)));
        atualizarInterface(filtrados);
    }

    function atualizarInterface(dados) {
        const tbody = document.querySelector('#dataTable tbody');
        tbody.innerHTML = dados.map(d => `<tr><td>${d.Data}</td><td>${d.Categoria}</td><td>${d.Valor}</td></tr>`).join('');

        document.getElementById('kpiTotal').textContent = dados.reduce((acc, curr) => acc + curr.Valor, 0);
        document.getElementById('kpiDias').textContent = [...new Set(dados.map(d => d.Data))].length;

        const categoriasMap = {};
        const diasMap = {};
        dados.forEach(d => { 
            categoriasMap[d.Categoria] = (categoriasMap[d.Categoria] || 0) + d.Valor; 
            diasMap[d.Data] = (diasMap[d.Data] || 0) + d.Valor; 
        });

        renderizarGraficos(Object.keys(diasMap), Object.values(diasMap), Object.keys(categoriasMap), Object.values(categoriasMap));
    }

    function renderizarGraficos(labelsDias, valoresDias, labelsCats, valoresCats) {
        if(meuChartDia) meuChartDia.destroy();
        if(meuChartCat) meuChartCat.destroy();
        if(meuChartDist) meuChartDist.destroy();

        // Cores dos Bombeiros/Fogo
        const paletaCores = ['#E65C00', '#FFD700', '#c62828', '#ff9800'];

        // Gráfico de Linha (Total por Dia)
        meuChartDia = new Chart(document.getElementById('chartDia').getContext('2d'), {
            type: 'line',
            data: { labels: labelsDias, datasets: [{ label: 'Total Ocorrências', data: valoresDias, borderColor: '#FFD700', backgroundColor: 'rgba(255, 215, 0, 0.2)', fill: true, tension: 0.3 }] },
            options: { responsive: true, plugins: { title: { display: true, text: 'Total de Eventos por Dia', color: '#fff', font: { size: 16 } }, legend: { display: false } } }
        });

        // Gráfico de Barras (Por Categoria)
        meuChartCat = new Chart(document.getElementById('chartCategoria').getContext('2d'), {
            type: 'bar',
            data: { labels: labelsCats, datasets: [{ data: valoresCats, backgroundColor: paletaCores }] },
            options: { responsive: true, plugins: { title: { display: true, text: 'Eventos por Categoria', color: '#fff', font: { size: 16 } }, legend: { display: false } } }
        });

        // Gráfico de Rosca (Distribuição)
        meuChartDist = new Chart(document.getElementById('chartDist').getContext('2d'), {
            type: 'doughnut',
            data: { labels: labelsCats, datasets: [{ data: valoresCats, backgroundColor: paletaCores, borderColor: '#16213e' }] },
            options: { responsive: true, plugins: { title: { display: true, text: 'Distribuição por Categoria', color: '#fff', font: { size: 16 } }, legend: { position: 'bottom', labels: { color: '#e0e0e0' } } } }
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
        configurarDataDiaAnterior();
        carregarDadosDaPlanilha();
    });
</script>
</body>
</html>
